<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sequence</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header id="toolbar">
      <h1>Sequence</h1>
      <div id="player-select">
        <button id="btn-2p" class="player-count active">2 Players</button>
        <button id="btn-3p" class="player-count">3 Players</button>
      </div>
      <div id="mode-select">
        <button id="btn-place" class="mode-btn active">Place</button>
        <button id="btn-remove" class="mode-btn">Remove</button>
      </div>
      <div id="players"></div>
      <button id="btn-next" class="action-btn">Next Turn</button>
      <button id="btn-rules" class="action-btn">Rules</button>
      <button id="btn-reset" class="action-btn danger">Reset</button>
    </header>
    <main id="board"></main>
  </div>

  <div id="rules-modal" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="rules-title">How to Play</h2>
        <div class="modal-header-right">
          <button id="btn-lang" class="lang-btn">ID</button>
          <button id="btn-close-rules" class="modal-close">&times;</button>
        </div>
      </div>
      <div id="rules-body" class="modal-body"></div>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
