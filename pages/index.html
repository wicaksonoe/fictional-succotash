<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sequence</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header id="toolbar">
      <h1>Sequence</h1>
      <div id="player-select">
        <button id="btn-2p" class="player-count active">2 Players</button>
        <button id="btn-3p" class="player-count">3 Players</button>
      </div>
      <div id="mode-select">
        <button id="btn-place" class="mode-btn active">Place</button>
        <button id="btn-remove" class="mode-btn">Remove</button>
      </div>
      <div id="players"></div>
      <button id="btn-next" class="action-btn">Next Turn</button>
      <button id="btn-reset" class="action-btn danger">Reset</button>
    </header>
    <main id="board"></main>
  </div>
  <script src="game.js"></script>
</body>
</html>
